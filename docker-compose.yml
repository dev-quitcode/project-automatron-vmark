version: "3.8"

services:
  # ── Orchestrator (FastAPI + LangGraph) ────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator/Dockerfile
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/automatron/workspaces:/var/automatron/workspaces
      # Dev: hot-reload
      - ./orchestrator/orchestrator:/app/orchestrator
      - ./orchestrator/prompts:/app/prompts
    secrets:
      - openai_api_key
      - anthropic_api_key
      - google_api_key
    environment:
      - SQLITE_DB_PATH=/app/data/automatron.db
      - CHECKPOINT_DB_PATH=/app/data/checkpoints.db
      - WORKSPACE_BASE_PATH=/var/automatron/workspaces
      - GOLDEN_IMAGE=automatron/golden:latest
      - DEBUG=true
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_OWNER_TYPE=${GITHUB_OWNER_TYPE:-user}
      - GITHUB_DEFAULT_ORG=${GITHUB_DEFAULT_ORG}
      - GITHUB_API_URL=${GITHUB_API_URL:-https://api.github.com}
      - GITHUB_REPO_VISIBILITY=${GITHUB_REPO_VISIBILITY:-private}
      - GITHUB_ENVIRONMENT_NAME=${GITHUB_ENVIRONMENT_NAME:-production}
      - GITHUB_ACTIONS_CI_WORKFLOW_NAME=${GITHUB_ACTIONS_CI_WORKFLOW_NAME:-CI}
      - GITHUB_ACTIONS_DEPLOY_WORKFLOW_NAME=${GITHUB_ACTIONS_DEPLOY_WORKFLOW_NAME:-Deploy}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Automatron Bot}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-automatron@example.local}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - AUTOMATRON_PUBLIC_URL=${AUTOMATRON_PUBLIC_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web UI (Next.js) ─────────────────────────────────────
  web-ui:
    build:
      context: .
      dockerfile: docker/web-ui/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://localhost:8000}
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - orchestrator
      - web-ui
    restart: unless-stopped
    profiles:
      - production

# ── Secrets ─────────────────────────────────────────────────
secrets:
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  google_api_key:
    file: ./secrets/google_api_key.txt
